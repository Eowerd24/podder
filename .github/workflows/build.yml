name: Build Linux Native Binary

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    # The softprops/action-gh-release action requires permissions to create releases
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config

    - name: Install Wails v3 CLI
      run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

    - name: Install Frontend NPM Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build Application Binary
      run: wails3 build

    - name: Upload Linux Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: podder-linux-amd64
        path: bin/podder

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/podder
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
